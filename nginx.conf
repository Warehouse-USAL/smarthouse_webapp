# Static SPA host. No backend proxy: the app calls the backend with bare paths
# (/auth, /products, ...) which the front Caddy proxy routes to the backend at
# root. Caddy strips the /app prefix before requests reach this container, so
# everything here is served from root.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — unknown paths serve index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
