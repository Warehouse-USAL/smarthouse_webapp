name: Pre-release

on:
  push:
    branches:
      - "beta/**"
      - "hotfix/**"

concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prerelease:
    name: Build and publish pre-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive pre-release tag
        id: tag
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"
          if [[ "$BRANCH" == beta/* ]]; then
            SERIES="${BRANCH#beta/}"
            EXISTING=$(git tag -l "beta-${SERIES}-*" | sort -V | tail -1)
            if [ -z "$EXISTING" ]; then
              N=1
            else
              LAST_N="${EXISTING##*-}"
              N=$((LAST_N + 1))
            fi
            TAG="beta-${SERIES}-${N}"
          elif [[ "$BRANCH" == hotfix/* ]]; then
            VERSION="${BRANCH#hotfix/}"
            EXISTING=$(git tag -l "hotfix-${VERSION}-*" | sort -V | tail -1)
            if [ -z "$EXISTING" ]; then
              N=1
            else
              LAST_N="${EXISTING##*-}"
              N=$((LAST_N + 1))
            fi
            TAG="hotfix-${VERSION}-${N}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Pre-release tag: $TAG"

      - name: Run quality checks
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/smarthouse_webapp"
          docker build -t "${IMAGE}:${{ steps.tag.outputs.tag }}" .
          docker push "${IMAGE}:${{ steps.tag.outputs.tag }}"

      - name: Create pre-release draft
        uses: softprops/action-gh-release@v2
        id: release
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Pre-release ${{ steps.tag.outputs.tag }}
          prerelease: true
          draft: true
          generate_release_notes: true

      - name: Publish pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.tag.outputs.tag }}" --draft=false --repo "${{ github.repository }}"
